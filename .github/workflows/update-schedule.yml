name: Update schedule data

on:
  schedule:
    # 13:00 UTC = 06:00 PT (5am during DST, 5am standard - close enough for a daily refresh)
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch PDFs and rebuild JSON
        run: ./parser/fetch-and-parse.sh

      - name: Commit and push if data changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- web/public/data; then
            echo "No schedule changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add web/public/data
          git commit -m "chore: update schedule data"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Schedule update failed (${new Date().toISOString().slice(0, 10)})`;
            const body = [
              `The daily schedule update workflow failed.`,
              ``,
              `Run: ${runUrl}`,
              ``,
              `Common causes:`,
              `- The City rotated the PDF URL (filename or upload-month folder changed). Update parser/sources.json.`,
              `- The PDF layout changed and the parser needs adjusting.`,
              `- Network or runner issue - re-run the workflow first.`,
            ].join("\n");

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "schedule-update-failure",
              per_page: 1,
            });

            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body: `Another failure on ${new Date().toISOString()}. Run: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["schedule-update-failure"],
              });
            }
