name: Update schedules from PDFs

# When a schedule PDF (or the parser) changes, regenerate the JSON the app reads
# and commit it back. That commit redeploys the site on Vercel.
on:
  push:
    paths:
      - 'pdfs/**'
      - 'scripts/parse_schedules.py'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install parser deps
        run: pip install -r scripts/requirements.txt

      - name: Parse PDFs → JSON
        run: python scripts/parse_schedules.py

      - name: Commit regenerated schedules
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/schedules
          if git diff --staged --quiet; then
            echo "No schedule changes."
          else
            git commit -m "chore: regenerate schedules from PDFs"
            git push
          fi
